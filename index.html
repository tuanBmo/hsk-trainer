<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK 3.0 Trainer - Mastery Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="section-title">🎯 CHỌN LEVEL</div>
            <div class="level-grid" id="levelGrid">
                </div>

            <div class="section-title" style="margin-top: 30px;">⚙️ SETTINGS</div>
            <div class="settings-box">
                <div class="switch-group">
                    <span>Hiện Pinyin</span>
                    <input type="checkbox" id="showPinyin" checked>
                </div>
                <div class="switch-group">
                    <span>Hiện Ví dụ</span>
                    <input type="checkbox" id="showExample" checked>
                </div>
                <div class="switch-group">
                    <span>Trộn câu</span>
                    <input type="checkbox" id="isRandom" checked>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <h1>HSK 3.0 Trainer</h1>
                <p>Dăm ba cái chữ Hán, nhắm mắt cũng chọn đại được! 😎</p>
            </header>

            <section class="mode-container">
                <div class="mode-title">🎁 HÀNH XÁC CHẾ ĐỘ NÀO ĐÂY CHIẾN THẦN?</div>
                <div class="mode-buttons">
                    <button class="mode-btn active" data-mode="NGHĨA">
                        NGHĨA
                        <span>Đoán bừa hay đoán mò?</span>
                    </button>
                    <button class="mode-btn" data-mode="PINYIN">
                        PINYIN
                        <span>Đọc sai là tự vả!</span>
                    </button>
                    <button class="mode-btn" data-mode="CHỮ HÁN">
                        CHỮ HÁN
                        <span>Chế độ 'Căng não'!</span>
                    </button>
                </div>
            </section>

            <button class="btn-start" id="btnStart">LÊN TRÌNH PHÁP SƯ</button>

            <div class="warning">⚠️ Học nhiều quá là bị nghiện đó nha!</div>
            <footer class="footer">Author: tuanbmo</footer>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
