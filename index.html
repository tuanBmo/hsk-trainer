<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HSK Mastery - Mobile Tabs</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #ec4899;
            --accent: #06b6d4;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --nav-bg: #1e1b4b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            font-family: 'Quicksand', sans-serif;
            background: #0f172a;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* KHU VỰC NỘI DUNG CHÍNH */
        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 100px; /* Chừa chỗ cho thanh điều hướng */
            background: radial-gradient(circle at top, #1e1b4b, #0f172a);
        }

        .tab-content { display: none; width: 100%; flex-direction: column; align-items: center; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: flex; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* THANH ĐIỀU HƯỚNG DƯỚI (BOTTOM NAV) */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 80px;
            background: rgba(30, 27, 75, 0.9);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #64748b;
            text-decoration: none;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-item.active { color: var(--accent); }
        .nav-item .icon { font-size: 24px; margin-bottom: 4px; }

        /* UI COMPONENTS */
        .glass-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            width: 100%;
            padding: 20px;
            margin-bottom: 20px;
        }

        .section-title { font-family: 'Montserrat', sans-serif; font-size: 14px; text-transform: uppercase; color: var(--accent); margin-bottom: 15px; letter-spacing: 1px; width: 100%; }

        /* LEVEL & SETTINGS */
        .level-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; }
        .lvl-pill { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: #fff; padding: 12px; border-radius: 15px; text-align: center; font-weight: 700; cursor: pointer; font-size: 14px; }
        .lvl-pill.active { background: var(--primary); border-color: transparent; box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4); }

        .setting-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--glass-border); }

        /* MODE CARDS */
        .mode-row { display: flex; flex-direction: column; gap: 12px; width: 100%; }
        .mode-card { background: var(--glass); border: 1px solid var(--glass-border); padding: 20px; border-radius: 25px; cursor: pointer; text-align: center; }
        .mode-card.active { border-color: var(--secondary); background: rgba(236, 72, 153, 0.1); }
        .mode-card b { color: var(--secondary); font-size: 18px; }

        /* GAME SCREEN OVERLAY (Khi chơi sẽ phủ toàn bộ) */
        #gameOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a; z-index: 2000;
            display: none; flex-direction: column; padding: 20px;
        }

        .btn-main { background: linear-gradient(135deg, #6366f1, #a855f7); color: white; border: none; padding: 18px 40px; border-radius: 50px; font-weight: 900; font-size: 18px; width: 100%; margin-top: 20px; cursor: pointer; }

        /* SWITCH STYLE */
        .tg-switch { position: relative; width: 44px; height: 24px; }
        .tg-switch input { opacity: 0; width: 0; height: 0; }
        .tg-slider { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: #334155; border-radius: 34px; cursor: pointer; }
        .tg-slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.3s; }
        input:checked + .tg-slider { background: var(--accent); }
        input:checked + .tg-slider:before { transform: translateX(20px); }

        .q-main { font-size: 60px; font-weight: 900; text-align: center; margin: 40px 0; }
        .ans-grid { display: grid; grid-template-columns: 1fr; gap: 12px; width: 100%; }
        .ans-btn { background: var(--glass); border: 1px solid var(--glass-border); color: white; padding: 20px; border-radius: 20px; font-weight: 700; font-size: 18px; text-align: center; }

    </style>
</head>
<body>

    <div class="content-area">
        
        <div id="tabLearn" class="tab-content active">
            <h1 style="font-family: 'Montserrat', sans-serif; font-size: 32px; font-weight: 900; margin-bottom: 5px;">HÀNH TRÌNH</h1>
            <p style="color: #64748b; margin-bottom: 30px;">Chọn chế độ để bắt đầu ✌️</p>

            <div class="section-title">CHẾ ĐỘ HỌC</div>
            <div class="mode-row">
                <div class="mode-card active" data-mode="NGHĨA"><b>NGHĨA</b><br><small>Đoán nghĩa từ vựng</small></div>
                <div class="mode-card" data-mode="PINYIN"><b>PINYIN</b><br><small>Học cách phát âm</small></div>
                <div class="mode-card" data-mode="CHỮ HÁN"><b>CHỮ HÁN</b><br><small>Nhớ mặt chữ</small></div>
            </div>

            <button class="btn-main" id="btnPlayNow">VÀO VIỆC LUÔN!</button>
        </div>

        <div id="tabSettings" class="tab-content">
            <h1 style="font-family: 'Montserrat', sans-serif; font-size: 28px; font-weight: 900;">LEVEL & CÀI ĐẶT</h1>
            
            <div class="section-title" style="margin-top: 30px;">LEVEL CỦA BẠN</div>
            <div class="level-grid" id="levelGrid"></div>

            <div class="section-title" style="margin-top: 30px;">TÙY CHỈNH</div>
            <div class="glass-card">
                <div class="setting-row">
                    <span>Hiện Pinyin</span>
                    <label class="tg-switch"><input type="checkbox" id="showPinyin" checked><span class="tg-slider"></span></label>
                </div>
                <div class="setting-row">
                    <span>Trộn câu</span>
                    <label class="tg-switch"><input type="checkbox" id="isRandom" checked><span class="tg-slider"></span></label>
                </div>
            </div>
        </div>

        <div id="tabData" class="tab-content">
            <h1 style="font-family: 'Montserrat', sans-serif; font-size: 28px; font-weight: 900;">DỮ LIỆU CỦA TÔI</h1>
            <p style="color: #64748b;">Nạp file CSV cá nhân vào đây</p>

            <div class="glass-card" style="margin-top: 20px;">
                <input type="file" id="fileInput" accept=".csv" style="display: none;">
                <button onclick="document.getElementById('fileInput').click()" class="btn-main" style="margin-top:0; font-size: 14px; padding: 15px;">+ THÊM FILE CSV</button>
                <div id="personalList" style="margin-top: 20px; display: flex; flex-direction: column; gap: 10px;"></div>
            </div>
        </div>
    </div>

    <div id="gameOverlay">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div id="hpBox" style="font-size: 22px;">❤️❤️❤️❤️❤️</div>
            <div id="progressInfo" style="font-weight: 800;">0/0</div>
            <button onclick="location.reload()" style="background:none; border:none; color: #ef4444; font-weight: 800; font-size: 24px;">✕</button>
        </div>
        
        <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;">
            <div id="lvlTag" style="background: var(--accent); color:#000; padding: 5px 15px; border-radius: 10px; font-weight: 900; font-size: 12px; margin-bottom: 20px;">HSK</div>
            <h2 class="q-main" id="qMain">你好</h2>
            <div style="display: flex; align-items: center; gap: 15px;">
                <p id="qSub" style="font-size: 22px; color: var(--accent); font-weight: 700;">nǐ hǎo</p>
                <button id="btnPeek" style="background:rgba(255,255,255,0.1); border:1px solid var(--glass-border); color:white; width: 40px; height: 40px; border-radius: 12px;">👁️</button>
            </div>
        </div>

        <div class="ans-grid" id="ansGrid"></div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('tabLearn', this)">
            <span class="icon">🚀</span>
            <span>Học tập</span>
        </div>
        <div class="nav-item" onclick="switchTab('tabSettings', this)">
            <span class="icon">⚙️</span>
            <span>Cấu hình</span>
        </div>
        <div class="nav-item" onclick="switchTab('tabData', this)">
            <span class="icon">📂</span>
            <span>Dữ liệu</span>
        </div>
    </nav>

    <script>
        const levels = ["HSK1", "HSK2", "HSK3", "HSK4", "HSK5", "HSK6", "HSK7", "HSK8", "HSK9"];
        let selectedLevels = [], selectedPersonal = [], selectedMode = "NGHĨA", masterData = [], currentQueue = [], index = 0, hp = 5, score = 0;
        let personalFiles = JSON.parse(localStorage.getItem('hsk_personal_files') || '{}');

        // CHUYỂN TAB
        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');
        }

        // RENDER LEVEL BUTTONS
        const grid = document.getElementById('levelGrid');
        levels.forEach(l => {
            const btn = document.createElement('div');
            btn.className = 'lvl-pill'; btn.innerText = l;
            btn.onclick = () => {
                btn.classList.toggle('active');
                const val = l.toLowerCase();
                selectedLevels.includes(val) ? selectedLevels = selectedLevels.filter(x => x !== val) : selectedLevels.push(val);
            };
            grid.appendChild(btn);
        });

        // PERSONAL FILES LOGIC
        document.getElementById('fileInput').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const name = file.name.replace('.csv', '');
                personalFiles[name] = e.target.result;
                localStorage.setItem('hsk_personal_files', JSON.stringify(personalFiles));
                renderPersonalList();
            };
            reader.readAsText(file);
        };

        function renderPersonalList() {
            const list = document.getElementById('personalList');
            list.innerHTML = '';
            Object.keys(personalFiles).forEach(name => {
                const item = document.createElement('div');
                item.style = `display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.05); padding:15px; border-radius:20px; border:1px solid ${selectedPersonal.includes(name) ? 'var(--accent)' : 'var(--glass-border)'}`;
                item.innerHTML = `<span onclick="togglePersonal('${name}')" style="flex:1; font-weight:bold">${name}</span> <span onclick="deletePersonal('${name}')" style="color:#ef4444; font-size:20px; padding:0 10px;">✕</span>`;
                list.appendChild(item);
            });
        }

        window.togglePersonal = (name) => {
            selectedPersonal.includes(name) ? selectedPersonal = selectedPersonal.filter(x => x !== name) : selectedPersonal.push(name);
            renderPersonalList();
        };

        window.deletePersonal = (name) => {
            if(confirm('Xóa file này?')) { delete personalFiles[name]; selectedPersonal = selectedPersonal.filter(x => x !== name); localStorage.setItem('hsk_personal_files', JSON.stringify(personalFiles)); renderPersonalList(); }
        };

        // CHỌN CHẾ ĐỘ
        document.querySelectorAll('.mode-card').forEach(card => {
            card.onclick = () => { document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('active')); card.classList.add('active'); selectedMode = card.dataset.mode; };
        });

        // BẮT ĐẦU CHƠI
        document.getElementById('btnPlayNow').onclick = async () => {
            if (selectedLevels.length === 0 && selectedPersonal.length === 0) {
                alert("Hãy sang Tab Cấu hình để chọn Level!");
                return;
            }
            masterData = [];
            for (let l of selectedLevels) {
                try {
                    const res = await fetch(`${l}.csv`);
                    const text = await res.text();
                    const parsed = Papa.parse(text, { skipEmptyLines: true });
                    masterData = [...masterData, ...parsed.data.map(r => ({ h: r[0], p: r[1], m: r[2], lvl: l.toUpperCase() }))];
                } catch(e) {}
            }
            for (let name of selectedPersonal) {
                const parsed = Papa.parse(personalFiles[name], { skipEmptyLines: true });
                masterData = [...masterData, ...parsed.data.map(r => ({ h: r[0], p: r[1], m: r[2], lvl: name.toUpperCase() }))];
            }
            
            if (masterData.length === 0) { alert("Dữ liệu rỗng!"); return; }
            
            currentQueue = [...masterData];
            if (document.getElementById('isRandom').checked) currentQueue.sort(() => Math.random() - 0.5);
            
            document.getElementById('gameOverlay').style.display = 'flex';
            renderQuiz();
        };

        function renderQuiz() {
            if (index >= currentQueue.length || hp <= 0) { alert(hp <= 0 ? "THẤT BẠI! 💀" : "QUÁ ĐỈNH! 🎉"); location.reload(); return; }
            const data = currentQueue[index];
            const isP = document.getElementById('showPinyin').checked;
            const btnPeek = document.getElementById('btnPeek');
            const qSub = document.getElementById('qSub');

            document.getElementById('lvlTag').innerText = data.lvl;
            document.getElementById('progressInfo').innerText = `${score}/${currentQueue.length}`;
            document.getElementById('hpBox').innerText = "❤️".repeat(Math.max(0, hp));
            
            btnPeek.style.display = "none";
            let correct = "";
            if (selectedMode === "NGHĨA") {
                document.getElementById('qMain').innerText = data.h;
                correct = data.m;
                isP ? qSub.innerText = data.p : (qSub.innerText = "****", btnPeek.style.display = "block");
            } else if (selectedMode === "PINYIN") {
                document.getElementById('qMain').innerText = data.h;
                qSub.innerText = data.m; correct = data.p;
            } else {
                document.getElementById('qMain').innerText = data.m;
                document.getElementById('qMain').style.fontSize = "32px";
                correct = data.h;
                isP ? qSub.innerText = data.p : (qSub.innerText = "****", btnPeek.style.display = "block");
            }

            btnPeek.onclick = () => { qSub.innerText = data.p; btnPeek.style.display = "none"; };

            const ansGrid = document.getElementById('ansGrid'); ansGrid.innerHTML = "";
            const key = selectedMode === "NGHĨA" ? 'm' : (selectedMode === "PINYIN" ? 'p' : 'h');
            let choices = [correct];
            const pool = [...new Set(masterData.map(x => x[key]))];
            while(choices.length < 4 && pool.length > 4) {
                let r = pool[Math.floor(Math.random() * pool.length)];
                if (!choices.includes(r)) choices.push(r);
            }
            choices.sort(() => Math.random() - 0.5);

            choices.forEach(c => {
                const b = document.createElement('button'); b.className = 'ans-btn'; b.innerText = c;
                b.onclick = () => {
                    if (c === correct) { score++; index++; renderQuiz(); }
                    else {
                        hp--;
                        alert("Đáp án đúng là: " + correct);
                        currentQueue.push(currentQueue.splice(index, 1)[0]);
                        renderQuiz();
                    }
                };
                ansGrid.appendChild(b);
            });
        }

        renderPersonalList();
    </script>
</body>
</html>
