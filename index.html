<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HSK Trainer - Mobile & Desktop</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #ec4899;
            --accent: #06b6d4;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }

        /* Hỗ trợ cuộn mượt cho toàn bộ trang */
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Vỏ bọc ứng dụng có khả năng co giãn */
        .app-shell {
            width: 1150px;
            height: 880px;
            max-width: 95vw;
            max-height: 95vh;
            background: var(--glass);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            display: flex;
            overflow: hidden; /* Chặn cuộn ngoài cùng */
            box-shadow: 0 50px 100px rgba(0,0,0,0.6);
        }

        /* SIDEBAR có thể cuộn nội dung bên trong */
        .sidebar {
            width: 320px;
            background: rgba(0, 0, 0, 0.3);
            padding: 30px 20px;
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            overflow-y: auto; /* Cuộn dọc nếu nội dung dài */
            scrollbar-width: thin;
            scrollbar-color: var(--primary) transparent;
        }

        .logo-text {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900; font-size: 24px;
            background: linear-gradient(to right, #818cf8, #f472b6);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 30px; text-align: center;
        }

        .side-title { color: #64748b; font-size: 11px; font-weight: 800; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1.5px; }

        .settings-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 15px; margin-bottom: 25px;
        }

        .setting-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; }
        .tg-switch { position: relative; display: inline-block; width: 40px; height: 22px; }
        .tg-switch input { opacity: 0; width: 0; height: 0; }
        .tg-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(255,255,255,0.1); border-radius: 34px; border: 1px solid var(--glass-border); }
        .tg-slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 2px; bottom: 2px; background-color: white; border-radius: 50%; }
        input:checked + .tg-slider { background: linear-gradient(135deg, var(--primary), var(--secondary)); border-color: transparent; }
        input:checked + .tg-slider:before { transform: translateX(18px); }

        .level-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .lvl-pill { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: #94a3b8; padding: 10px; border-radius: 12px; font-weight: 700; cursor: pointer; text-align: center; font-size: 13px; }
        .lvl-pill.active { background: var(--primary); color: white; border-color: transparent; }

        /* MAIN CONTENT */
        .main-screen {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto; /* Cuộn nội dung chính nếu màn hình thấp */
        }

        .hero-title { font-family: 'Montserrat', sans-serif; font-size: clamp(32px, 8vw, 64px); font-weight: 900; margin: 0; text-align: center; line-height: 1.1; }

        .mode-shelf { display: flex; gap: 15px; margin: 40px 0; width: 100%; flex-wrap: wrap; justify-content: center; }
        .mode-card { flex: 1; min-width: 140px; background: rgba(255,255,255,0.03); border: 2px solid var(--glass-border); padding: 20px; border-radius: 25px; text-align: center; cursor: pointer; }
        .mode-card.active { border-color: var(--accent); background: rgba(6, 182, 212, 0.1); }

        .btn-play { background: linear-gradient(135deg, #6366f1, #a855f7); color: white; border: none; padding: 20px 60px; border-radius: 100px; font-family: 'Montserrat', sans-serif; font-size: 20px; font-weight: 900; cursor: pointer; box-shadow: 0 20px 40px rgba(99, 102, 241, 0.4); width: fit-content; }

        /* GAME UI */
        .flash-card { background: var(--glass); width: 100%; max-width: 600px; padding: 50px 20px; border-radius: 40px; border: 1px solid var(--glass-border); text-align: center; position: relative; margin-bottom: 30px; }
        .q-main { font-size: clamp(40px, 15vw, 100px); font-weight: 900; margin: 0; }
        .ans-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 600px; }
        .ans-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: white; padding: 18px; border-radius: 20px; font-size: 16px; font-weight: 700; cursor: pointer; }

        /* RESPONSIVE CHO ĐIỆN THOẠI */
        @media (max-width: 768px) {
            .app-shell {
                flex-direction: column; /* Chuyển Sidebar lên trên hoặc ẩn đi */
                height: 100vh;
                max-height: 100vh;
                max-width: 100vw;
                border-radius: 0;
            }

            .sidebar {
                width: 100%;
                height: auto;
                max-height: 30%;
                border-right: none;
                border-bottom: 1px solid var(--glass-border);
                padding: 15px;
            }

            .logo-text { margin-bottom: 10px; font-size: 20px; }
            .level-grid { display: flex; overflow-x: auto; gap: 8px; padding-bottom: 10px; }
            .lvl-pill { min-width: 80px; flex-shrink: 0; }

            .main-screen { padding: 20px; }
            .ans-grid { grid-template-columns: 1fr; } /* Đáp án xếp 1 hàng dọc trên điện thoại */
            .hero-title { font-size: 36px; }
            .mode-shelf { gap: 10px; }
            .mode-card { padding: 15px; border-radius: 20px; }
        }

        .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; }
        .screen.active { display: flex; }
        .shake { animation: error 0.4s ease-in-out; }
        @keyframes error { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-10px); } 40%, 80% { transform: translateX(10px); } }
    </style>
</head>
<body>

    <div class="app-shell">
        <aside class="sidebar">
            <div class="logo-text">HSK MASTER ⚡</div>
            
            <div class="side-title">Cấu hình ⚙️</div>
            <div class="settings-card">
                <div class="setting-item">
                    <span>Hiện Pinyin</span>
                    <label class="tg-switch"><input type="checkbox" id="showPinyin" checked><span class="tg-slider"></span></label>
                </div>
                <div class="setting-item">
                    <span>Trộn câu</span>
                    <label class="tg-switch"><input type="checkbox" id="isRandom" checked><span class="tg-slider"></span></label>
                </div>
            </div>

            <div class="side-title">Level 🏆</div>
            <div class="level-grid" id="levelGrid"></div>
            
            <div class="side-title">Personal Files 📂</div>
            <div style="background: rgba(0,0,0,0.2); padding: 10px; border-radius: 15px; border: 1px dashed var(--glass-border);">
                <input type="file" id="fileInput" accept=".csv" style="display: none;">
                <button onclick="document.getElementById('fileInput').click()" style="width: 100%; background: var(--primary); border: none; color: white; padding: 10px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 11px;">+ THÊM CSV</button>
                <div id="personalList" style="margin-top: 10px; display: flex; flex-direction: column; gap: 5px;"></div>
            </div>
        </aside>

        <main class="main-screen">
            <div id="homeScreen" class="screen active">
                <h1 class="hero-title">READY TO<br><span style="color: var(--accent);">LEARN?</span></h1>
                <div class="mode-shelf">
                    <div class="mode-card active" data-mode="NGHĨA"><b>NGHĨA</b></div>
                    <div class="mode-card" data-mode="PINYIN"><b>PINYIN</b></div>
                    <div class="mode-card" data-mode="CHỮ HÁN"><b>CHỮ HÁN</b></div>
                </div>
                <button class="btn-play" id="btnPlay">VÀO VIỆC!</button>
            </div>

            <div id="gameScreen" class="screen">
                <nav class="game-nav">
                    <div id="hpBox" style="font-size: 24px;">❤️❤️❤️❤️❤️</div>
                    <div id="progressInfo" style="font-weight: 800; color: #64748b;">0/0</div>
                    <button onclick="location.reload()" style="background: #ef4444; border: none; color: white; padding: 8px 15px; border-radius: 10px; font-weight: 800; cursor: pointer;">THOÁT</button>
                </nav>

                <div class="flash-card" id="card">
                    <div id="lvlTag" style="position: absolute; top: 20px; right: 20px; background: var(--accent); color: var(--bg); padding: 4px 10px; border-radius: 8px; font-weight: 900; font-size: 11px;">HSK</div>
                    <h2 class="q-main" id="qMain">你好</h2>
                    <div style="display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 15px;">
                        <p id="qSub" style="font-size: 24px; color: var(--accent); font-weight: 700; margin: 0;">nǐ hǎo</p>
                        <button id="btnPeek" style="background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); color: white; width: 35px; height: 35px; border-radius: 8px; cursor: pointer; font-size: 16px;">👁️</button>
                    </div>
                </div>
                <div class="ans-grid" id="ansGrid"></div>
            </div>
        </main>
    </div>

    <script>
        const levels = ["HSK1", "HSK2", "HSK3", "HSK4", "HSK5", "HSK6", "HSK7", "HSK8", "HSK9"];
        let selectedLevels = [], selectedPersonal = [], selectedMode = "NGHĨA", masterData = [], currentQueue = [], index = 0, hp = 5, score = 0;
        let personalFiles = JSON.parse(localStorage.getItem('hsk_personal_files') || '{}');

        // Render Sidebar Levels
        const grid = document.getElementById('levelGrid');
        levels.forEach(l => {
            const btn = document.createElement('div');
            btn.className = 'lvl-pill'; btn.innerText = l;
            btn.onclick = () => {
                btn.classList.toggle('active');
                const val = l.toLowerCase();
                selectedLevels.includes(val) ? selectedLevels = selectedLevels.filter(x => x !== val) : selectedLevels.push(val);
            };
            grid.appendChild(btn);
        });

        // Personal Files
        document.getElementById('fileInput').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const name = file.name.replace('.csv', '');
                personalFiles[name] = e.target.result;
                localStorage.setItem('hsk_personal_files', JSON.stringify(personalFiles));
                renderPersonalList();
            };
            reader.readAsText(file);
        };

        function renderPersonalList() {
            const list = document.getElementById('personalList');
            list.innerHTML = '';
            Object.keys(personalFiles).forEach(name => {
                const item = document.createElement('div');
                item.style = `display:flex; justify-content:space-between; font-size:12px; background:rgba(255,255,255,0.05); padding:8px; border-radius:8px; border:1px solid ${selectedPersonal.includes(name) ? 'var(--accent)' : 'transparent'}`;
                item.innerHTML = `<span onclick="togglePersonal('${name}')" style="cursor:pointer; flex:1">${name}</span><span onclick="deletePersonal('${name}')" style="color:#ef4444; cursor:pointer">✕</span>`;
                list.appendChild(item);
            });
        }

        window.togglePersonal = (name) => {
            selectedPersonal.includes(name) ? selectedPersonal = selectedPersonal.filter(x => x !== name) : selectedPersonal.push(name);
            renderPersonalList();
        };

        window.deletePersonal = (name) => {
            if(confirm('Xóa file này?')) { delete personalFiles[name]; selectedPersonal = selectedPersonal.filter(x => x !== name); localStorage.setItem('hsk_personal_files', JSON.stringify(personalFiles)); renderPersonalList(); }
        };

        // Mode Switching
        document.querySelectorAll('.mode-card').forEach(card => {
            card.onclick = () => { document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('active')); card.classList.add('active'); selectedMode = card.dataset.mode; };
        });

        // Play Logic
        document.getElementById('btnPlay').onclick = async () => {
            if (selectedLevels.length === 0 && selectedPersonal.length === 0) return alert("Chọn ít nhất 1 Level hoặc File!");
            masterData = [];
            for (let l of selectedLevels) {
                try {
                    const res = await fetch(`${l}.csv`);
                    const text = await res.text();
                    const parsed = Papa.parse(text, { skipEmptyLines: true });
                    masterData = [...masterData, ...parsed.data.map(r => ({ h: r[0], p: r[1], m: r[2], lvl: l.toUpperCase() }))];
                } catch(e) {}
            }
            for (let name of selectedPersonal) {
                const parsed = Papa.parse(personalFiles[name], { skipEmptyLines: true });
                masterData = [...masterData, ...parsed.data.map(r => ({ h: r[0], p: r[1], m: r[2], lvl: name.toUpperCase() }))];
            }
            currentQueue = [...masterData];
            if (document.getElementById('isRandom').checked) currentQueue.sort(() => Math.random() - 0.5);
            document.getElementById('homeScreen').classList.remove('active');
            document.getElementById('gameScreen').classList.add('active');
            render();
        };

        function render() {
            if (index >= currentQueue.length || hp <= 0) { alert(hp <= 0 ? "BẠN ĐÃ THẤT BẠI! 💀" : "CHIẾN THẦN TIẾNG TRUNG! 🎉"); location.reload(); return; }
            const data = currentQueue[index];
            const isP = document.getElementById('showPinyin').checked;
            const btnPeek = document.getElementById('btnPeek');
            const qSub = document.getElementById('qSub');

            document.getElementById('lvlTag').innerText = data.lvl;
            document.getElementById('progressInfo').innerText = `${score}/${currentQueue.length}`;
            document.getElementById('hpBox').innerText = "❤️".repeat(Math.max(0, hp));
            
            btnPeek.style.display = "none";
            let correct = "";
            if (selectedMode === "NGHĨA") {
                document.getElementById('qMain').innerText = data.h; document.getElementById('qMain').style.fontSize = "clamp(40px, 15vw, 100px)";
                correct = data.m; isP ? qSub.innerText = data.p : (qSub.innerText = "****", btnPeek.style.display = "block");
            } else if (selectedMode === "PINYIN") {
                document.getElementById('qMain').innerText = data.h; qSub.innerText = data.m; correct = data.p;
            } else {
                document.getElementById('qMain').innerText = data.m; document.getElementById('qMain').style.fontSize = "30px";
                correct = data.h; isP ? qSub.innerText = data.p : (qSub.innerText = "****", btnPeek.style.display = "block");
            }
            btnPeek.onclick = () => { qSub.innerText = data.p; btnPeek.style.display = "none"; };

            const ansGrid = document.getElementById('ansGrid'); ansGrid.innerHTML = "";
            const key = selectedMode === "NGHĨA" ? 'm' : (selectedMode === "PINYIN" ? 'p' : 'h');
            let choices = [correct];
            const pool = [...new Set(masterData.map(x => x[key]))];
            while(choices.length < 4 && pool.length > 4) {
                let r = pool[Math.floor(Math.random() * pool.length)];
                if (!choices.includes(r)) choices.push(r);
            }
            choices.sort(() => Math.random() - 0.5);
            choices.forEach(c => {
                const b = document.createElement('button'); b.className = 'ans-btn'; b.innerText = c;
                b.onclick = () => {
                    if (c === correct) { score++; index++; render(); }
                    else { hp--; document.getElementById('card').classList.add('shake'); setTimeout(() => document.getElementById('card').classList.remove('shake'), 400); alert("Đáp án: " + correct); currentQueue.push(currentQueue.splice(index, 1)[0]); render(); }
                };
                ansGrid.appendChild(b);
            });
        }
        renderPersonalList();
    </script>
</body>
</html>
