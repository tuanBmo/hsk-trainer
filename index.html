<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK 3.0 Trainer - Mastery Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="flex h-screen overflow-hidden text-white">

    <aside class="sidebar w-64 p-6 flex flex-col border-r border-slate-700">
        <h2 class="text-sky-400 font-bold text-center mb-6 tracking-wider">🎯 CHỌN LEVEL</h2>
        <div id="level-list" class="flex flex-col gap-2 overflow-y-auto pr-2 mb-8">
            </div>
        
        <h2 class="text-teal-400 font-bold text-center mb-4">⚙️ SETTINGS</h2>
        <div class="bg-slate-900/50 p-4 rounded-2xl space-y-4 border border-slate-700">
            <div class="flex justify-between items-center text-sm">
                <span>Hiện Pinyin</span>
                <input type="checkbox" id="set-pinyin" checked class="w-4 h-4">
            </div>
            <div class="flex justify-between items-center text-sm">
                <span>Trộn câu</span>
                <input type="checkbox" id="set-random" checked class="w-4 h-4">
            </div>
        </div>
        <div class="mt-auto text-center opacity-30 text-xs font-bold">Author: tuanbmo</div>
    </aside>

    <main class="flex-1 flex flex-col items-center justify-center p-10 relative bg-[#0f172a]">
        
        <div id="menu-screen" class="w-full max-w-2xl">
            <h1 class="text-7xl font-black text-sky-400 text-center mb-2 drop-shadow-lg">HSK 3.0 Trainer</h1>
            <p class="text-slate-400 text-center italic mb-12">Dăm ba cái chữ Hán, nhắm mắt cũng chọn đại được! 😎</p>
            
            <div class="card-bg p-8 rounded-[30px] border border-slate-700 mb-10 text-center shadow-2xl">
                <p class="text-xs font-bold tracking-[0.2em] mb-8 text-slate-500">🎁 HÀNH XÁC CHẾ ĐỘ NÀO ĐÂY CHIẾN THẦN?</p>
                <div class="grid grid-cols-3 gap-4">
                    <button onclick="selectMode('NGHĨA')" id="mode-NGHĨA" class="btn-mode py-4 rounded-xl font-bold btn-active">NGHĨA</button>
                    <button onclick="selectMode('PINYIN')" id="mode-PINYIN" class="btn-mode py-4 rounded-xl font-bold">PINYIN</button>
                    <button onclick="selectMode('HANZI')" id="mode-HANZI" class="btn-mode py-4 rounded-xl font-bold">CHỮ HÁN</button>
                </div>
            </div>

            <button onclick="startGame()" class="w-full bg-sky-500 hover:bg-sky-400 py-7 rounded-full text-3xl font-black shadow-lg shadow-sky-500/30 transition-all active:scale-95">
                VÀO VIỆC LUÔN!
            </button>
        </div>

        <div id="game-screen" class="hidden w-full max-w-2xl text-center">
            <div class="flex justify-between items-center w-full mb-10">
                <span id="hp-display" class="text-red-500 text-4xl drop-shadow-md">♥♥♥♥♥</span>
                <button onclick="location.reload()" class="bg-red-500/10 hover:bg-red-500/20 text-red-400 px-4 py-2 rounded-lg text-sm font-bold transition">✖ Bỏ cuộc</button>
            </div>
            
            <div class="card-bg p-12 rounded-[40px] border-2 border-sky-500 mb-10 relative shadow-2xl">
                <span id="lvl-tag" class="absolute top-6 right-6 bg-sky-500 text-slate-900 px-4 py-1 rounded-full font-black text-xs">HSK1</span>
                <h2 id="main-q" class="text-8xl font-black mb-6">---</h2>
                <p id="sub-q" class="text-3xl text-slate-400 font-medium">---</p>
            </div>

            <div id="ans-container" class="grid grid-cols-1 gap-4">
                </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
