<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HSK 3.0 Trainer - Mastery Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0f172a] text-white flex flex-col md:flex-row h-screen overflow-hidden">

    <aside class="sidebar w-full md:w-[280px] flex flex-col border-b md:border-b-0 md:border-r-4 border-[#334155] h-[25vh] md:h-full">
        <div class="p-4 md:p-6 overflow-y-auto flex-1">
            <h2 class="text-[#38bdf8] font-bold text-center mb-4 tracking-widest uppercase text-[10px] md:text-sm">🎯 Chọn Level</h2>
            <div id="level-list" class="grid grid-cols-4 md:grid-cols-1 gap-2"></div>

            <div class="mt-6">
                <h2 class="text-[#2dd4bf] font-bold text-center mb-3 uppercase text-[10px]">⚙️ Settings</h2>
                <div class="bg-[#1e293b] p-3 rounded-2xl space-y-3 border border-[#334155]">
                    <div class="flex justify-between items-center text-[10px] md:text-xs">
                        <span>Hiện Pinyin</span>
                        <label class="switch"><input type="checkbox" id="set-pinyin" checked><span class="slider"></span></label>
                    </div>
                    <div class="flex justify-between items-center text-[10px] md:text-xs">
                        <span>Trộn câu</span>
                        <label class="switch"><input type="checkbox" id="set-random" checked><span class="slider"></span></label>
                    </div>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col items-center justify-center p-4 md:p-10 relative overflow-hidden">
        
        <div id="menu-screen" class="w-full max-w-2xl text-center">
            <h1 class="text-5xl md:text-7xl font-black text-[#38bdf8] mb-2 drop-shadow-xl">HSK 3.0</h1>
            <p class="text-[#94a3b8] italic mb-10 text-sm md:text-base">Dăm ba cái chữ Hán! 😎</p>
            <div class="bg-[#1e293b] p-6 rounded-[30px] border border-[#334155] mb-8">
                <div class="grid grid-cols-3 gap-2 md:gap-4">
                    <button onclick="selectMode('NGHĨA')" id="mode-NGHĨA" class="btn-mode py-4 rounded-xl text-xs md:text-base font-bold active-mode">NGHĨA</button>
                    <button onclick="selectMode('PINYIN')" id="mode-PINYIN" class="btn-mode py-4 rounded-xl text-xs md:text-base font-bold">PINYIN</button>
                    <button onclick="selectMode('HANZI')" id="mode-HANZI" class="btn-mode py-4 rounded-xl text-xs md:text-base font-bold">CHỮ</button>
                </div>
            </div>
            <button onclick="startGame()" class="btn-start w-full py-6 text-white text-2xl font-black shadow-xl">VÀO VIỆC LUÔN!</button>
        </div>

        <div id="game-screen" class="hidden w-full max-w-2xl flex flex-col h-full">
            <div class="flex justify-between items-center mb-4 pt-2">
                <span id="hp-display" class="text-[#f43f5e] text-3xl md:text-4xl">♥♥♥♥♥</span>
                <button onclick="confirmExit()" class="bg-[#f43f5e] text-white px-4 py-2 rounded-xl font-bold text-xs">Bỏ cuộc</button>
            </div>
            <div class="bg-[#1e293b] p-8 md:p-12 rounded-[30px] border-2 border-[#38bdf8] relative mb-6 shadow-2xl">
                <span id="lvl-tag" class="absolute top-4 right-4 bg-[#38bdf8] text-[#0f172a] px-3 py-1 rounded-lg font-black text-[10px]">HSK1</span>
                <h2 id="main-q" class="text-6xl md:text-8xl font-black mb-2 text-white">---</h2>
                <p id="sub-q" class="text-xl md:text-3xl text-[#94a3b8]">---</p>
            </div>
            <div id="ans-container" class="grid grid-cols-1 gap-3 overflow-y-auto pb-10"></div>
        </div>

        <div id="finish-screen" class="hidden w-full max-w-2xl text-center overflow-y-auto">
            <h2 id="finish-title" class="text-4xl md:text-6xl font-black text-[#38bdf8] mb-8">THẤT BẠI RỒI! 💀</h2>
            <div id="wrong-list" class="space-y-3 mb-10 text-left"></div>
            <button onclick="location.reload()" class="bg-[#8b5cf6] w-full py-5 rounded-full text-xl font-bold">VỀ MENU</button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
