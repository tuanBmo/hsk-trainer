<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK Trainer - Personal Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #ec4899;
            --accent: #06b6d4;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; transition: all 0.25s ease; }

        body {
            margin: 0;
            font-family: 'Quicksand', sans-serif;
            background: radial-gradient(circle at top right, #312e81, #0f172a);
            color: #fff;
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        .app-shell {
            width: 1100px; height: 850px; max-width: 95vw; max-height: 95vh;
            background: var(--glass); backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); border-radius: 45px;
            display: flex; overflow: hidden; box-shadow: 0 50px 100px rgba(0,0,0,0.5);
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 320px; background: rgba(0, 0, 0, 0.2);
            padding: 30px; border-right: 1px solid var(--glass-border);
            display: flex; flex-direction: column; overflow-y: auto;
        }

        .logo-text {
            font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 24px;
            background: linear-gradient(to right, #818cf8, #f472b6);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 30px; text-align: center;
        }

        .side-title { color: #94a3b8; font-size: 11px; font-weight: 800; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }

        .level-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 25px; }

        .lvl-pill {
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            color: white; padding: 10px; border-radius: 15px; font-weight: 700;
            cursor: pointer; text-align: center; font-size: 13px;
        }

        .lvl-pill.active { background: linear-gradient(135deg, var(--primary), var(--secondary)); border-color: transparent; }

        /* MỤC PERSONAL FILES */
        .personal-section { background: rgba(0,0,0,0.2); border-radius: 20px; padding: 15px; margin-bottom: 20px; border: 1px dashed var(--glass-border); }
        #personalList { display: flex; flex-direction: column; gap: 5px; margin-top: 10px; }
        .p-file-item { display: flex; justify-content: space-between; align-items: center; font-size: 12px; background: var(--glass); padding: 8px 12px; border-radius: 10px; }
        .btn-del { color: #ef4444; cursor: pointer; font-weight: bold; }
        .btn-add-file { width: 100%; padding: 10px; border-radius: 12px; background: var(--primary); border: none; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 12px; }

        /* --- MAIN AREA --- */
        .main-screen { flex: 1; padding: 50px; display: flex; flex-direction: column; align-items: center; overflow-y: auto; }
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; }
        .screen.active { display: flex; }

        .mode-shelf { display: flex; gap: 15px; margin: 40px 0; width: 100%; }
        .mode-card { flex: 1; background: rgba(255,255,255,0.03); border: 2px solid var(--glass-border); padding: 25px 15px; border-radius: 30px; text-align: center; cursor: pointer; }
        .mode-card.active { border-color: var(--accent); background: rgba(6, 182, 212, 0.1); transform: translateY(-5px); }
        .mode-card b { font-size: 18px; color: var(--accent); display: block; margin-bottom: 5px; }

        .btn-play { background: linear-gradient(135deg, #6366f1, #a855f7); color: white; border: none; padding: 20px 70px; border-radius: 100px; font-family: 'Montserrat', sans-serif; font-size: 22px; font-weight: 900; cursor: pointer; box-shadow: 0 20px 40px rgba(99, 102, 241, 0.3); }

        /* --- GAME UI --- */
        .game-nav { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .hp-dots { font-size: 28px; color: #ef4444; }
        .flash-card { background: var(--glass); width: 100%; max-width: 600px; padding: 50px; border-radius: 45px; border: 1px solid var(--glass-border); text-align: center; position: relative; margin-bottom: 30px; }
        .q-main { font-size: 90px; font-weight: 900; margin: 0; }
        .q-sub-container { display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 15px; min-height: 40px; }
        .q-sub { font-size: 24px; color: var(--accent); font-weight: 700; margin: 0; }
        .btn-peek { background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); color: white; width: 35px; height: 35px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .ans-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 650px; }
        .ans-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: white; padding: 20px; border-radius: 25px; font-size: 18px; font-weight: 700; cursor: pointer; }
        .shake { animation: error 0.4s ease-in-out; }
        @keyframes error { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-10px); } 40%, 80% { transform: translateX(10px); } }
    </style>
</head>
<body>

    <div class="app-shell">
        <aside class="sidebar">
            <div class="logo-text">HSK GEN-Z ⚡</div>
            
            <div class="side-title">Hệ thống Level</div>
            <div class="level-grid" id="levelGrid"></div>
            
            <div class="side-title">Personal Files 📂</div>
            <div class="personal-section">
                <input type="file" id="fileInput" accept=".csv" style="display: none;">
                <button class="btn-add-file" onclick="document.getElementById('fileInput').click()">+ THÊM FILE CSV</button>
                <div id="personalList"></div>
            </div>

            <div style="margin-top: auto; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 25px;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 12px;">
                    <span>Hiện Pinyin</span>
                    <input type="checkbox" id="showPinyin" checked>
                </div>
                <div style="display: flex; justify-content: space-between; font-size: 12px;">
                    <span>Trộn câu</span>
                    <input type="checkbox" id="isRandom" checked>
                </div>
            </div>
        </aside>

        <main class="main-screen">
            <div id="homeScreen" class="screen active">
                <h1 class="hero-title">BẮT ĐẦU<br><span style="color: var(--accent);">HÀNH TRÌNH</span></h1>
                <div class="mode-shelf">
                    <div class="mode-card active" data-mode="NGHĨA"><b>NGHĨA</b><span>Đoán nghĩa</span></div>
                    <div class="mode-card" data-mode="PINYIN"><b>PINYIN</b><span>Đoán Pinyin</span></div>
                    <div class="mode-card" data-mode="CHỮ HÁN"><b>CHỮ HÁN</b><span>Đoán chữ</span></div>
                </div>
                <button class="btn-play" id="btnPlay">VÀO VIỆC!</button>
                <p style="margin-top: 30px; color: #475569; font-size: 12px; font-weight: 700;">Author: tuanbmo | Storage Edition</p>
            </div>

            <div id="gameScreen" class="screen">
                <nav class="game-nav">
                    <div class="hp-dots" id="hpBox">❤️❤️❤️❤️❤️</div>
                    <div id="progressInfo" style="font-weight: 800; color: #94a3b8;">0/0</div>
                    <button onclick="location.reload()" style="background: #ef4444; border: none; color: white; padding: 8px 15px; border-radius: 12px; font-weight: 800; cursor: pointer;">DỪNG</button>
                </nav>

                <div class="flash-card" id="card">
                    <div id="lvlTag" style="position: absolute; top: 20px; right: 20px; background: var(--accent); color: #000; padding: 4px 10px; border-radius: 8px; font-weight: 800; font-size: 11px;">HSK</div>
                    <h2 class="q-main" id="qMain">你好</h2>
                    <div class="q-sub-container">
                        <p class="q-sub" id="qSub">nǐ hǎo</p>
                        <button class="btn-peek" id="btnPeek">👁</button>
                    </div>
                </div>
                <div class="ans-grid" id="ansGrid"></div>
            </div>
        </main>
    </div>

    <script>
        const levels = ["HSK1", "HSK2", "HSK3", "HSK4", "HSK5", "HSK6", "HSK7", "HSK8", "HSK9"];
        let selectedLevels = [], selectedPersonal = [], selectedMode = "NGHĨA", masterData = [], currentQueue = [], index = 0, hp = 5, score = 0;
        let personalFiles = JSON.parse(localStorage.getItem('hsk_personal_files') || '{}');

        // Init Level Buttons
        const grid = document.getElementById('levelGrid');
        levels.forEach(l => {
            const btn = document.createElement('div');
            btn.className = 'lvl-pill'; btn.innerText = l;
            btn.onclick = () => { btn.classList.toggle('active'); const val = l.toLowerCase(); if (selectedLevels.includes(val)) selectedLevels = selectedLevels.filter(x => x !== val); else selectedLevels.push(val); }
            grid.appendChild(btn);
        });

        // Xử lý nạp file cá nhân
        document.getElementById('fileInput').onchange = function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const name = file.name.replace('.csv', '');
                personalFiles[name] = e.target.result;
                localStorage.setItem('hsk_personal_files', JSON.stringify(personalFiles));
                renderPersonalList();
            };
            reader.readAsText(file);
        };

        function renderPersonalList() {
            const list = document.getElementById('personalList');
            list.innerHTML = '';
            Object.keys(personalFiles).forEach(name => {
                const item = document.createElement('div');
                item.className = `p-file-item ${selectedPersonal.includes(name) ? 'active' : ''}`;
                if(selectedPersonal.includes(name)) item.style.borderColor = "var(--accent)";
                
                item.innerHTML = `
                    <span onclick="togglePersonal('${name}')" style="cursor:pointer; flex:1">${name}</span>
                    <span class="btn-del" onclick="deletePersonal('${name}')">✕</span>
                `;
                list.appendChild(item);
            });
        }

        window.togglePersonal = (name) => {
            if(selectedPersonal.includes(name)) selectedPersonal = selectedPersonal.filter(x => x !== name);
            else selectedPersonal.push(name);
            renderPersonalList();
        };

        window.deletePersonal = (name) => {
            if(confirm('Xóa file này?')) {
                delete personalFiles[name];
                selectedPersonal = selectedPersonal.filter(x => x !== name);
                localStorage.setItem('hsk_personal_files', JSON.stringify(personalFiles));
                renderPersonalList();
            }
        };

        // Mode Switching
        document.querySelectorAll('.mode-card').forEach(card => {
            card.onclick = () => { document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('active')); card.classList.add('active'); selectedMode = card.dataset.mode; }
        });

        // Play Logic
        document.getElementById('btnPlay').onclick = async () => {
            if (selectedLevels.length === 0 && selectedPersonal.length === 0) return alert("Chọn Level hoặc File cá nhân!");
            masterData = [];

            // Nạp file hệ thống
            for (let l of selectedLevels) {
                try {
                    const res = await fetch(`${l}.csv`);
                    const text = await res.text();
                    const parsed = Papa.parse(text, { skipEmptyLines: true });
                    masterData = [...masterData, ...parsed.data.map(r => ({ h: r[0], p: r[1], m: r[2], lvl: l.toUpperCase() }))];
                } catch(e) {}
            }

            // Nạp file cá nhân từ Storage
            for (let name of selectedPersonal) {
                const text = personalFiles[name];
                const parsed = Papa.parse(text, { skipEmptyLines: true });
                masterData = [...masterData, ...parsed.data.map(r => ({ h: r[0], p: r[1], m: r[2], lvl: name.toUpperCase() }))];
            }

            if (masterData.length === 0) return alert("Dữ liệu rỗng!");
            currentQueue = [...masterData];
            if (document.getElementById('isRandom').checked) currentQueue.sort(() => Math.random() - 0.5);
            document.getElementById('homeScreen').classList.remove('active');
            document.getElementById('gameScreen').classList.add('active');
            render();
        };

        function render() {
            if (index >= currentQueue.length || hp <= 0) { alert(hp <= 0 ? "THẤT BẠI! 💀" : "XUẤT SẮC! 🎉"); location.reload(); return; }
            const data = currentQueue[index];
            const isP = document.getElementById('showPinyin').checked;
            const btnPeek = document.getElementById('btnPeek');
            const qSub = document.getElementById('qSub');

            document.getElementById('lvlTag').innerText = data.lvl;
            document.getElementById('progressInfo').innerText = `${score}/${currentQueue.length}`;
            document.getElementById('hpBox').innerText = "❤️".repeat(Math.max(0, hp));
            btnPeek.style.display = "none";
            
            let correct = "";
            if (selectedMode === "NGHĨA") {
                document.getElementById('qMain').innerText = data.h; document.getElementById('qMain').style.fontSize = "100px";
                correct = data.m; if (isP) qSub.innerText = data.p; else { qSub.innerText = "****"; btnPeek.style.display = "flex"; }
            } else if (selectedMode === "PINYIN") {
                document.getElementById('qMain').innerText = data.h; document.getElementById('qMain').style.fontSize = "100px";
                qSub.innerText = data.m; correct = data.p;
            } else {
                document.getElementById('qMain').innerText = data.m; document.getElementById('qMain').style.fontSize = "40px";
                correct = data.h; if (isP) qSub.innerText = data.p; else { qSub.innerText = "****"; btnPeek.style.display = "flex"; }
            }

            btnPeek.onclick = () => { qSub.innerText = data.p; btnPeek.style.display = "none"; };

            const ansGrid = document.getElementById('ansGrid'); ansGrid.innerHTML = "";
            const key = selectedMode === "NGHĨA" ? 'm' : (selectedMode === "PINYIN" ? 'p' : 'h');
            let choices = [correct];
            const pool = [...new Set(masterData.map(x => x[key]))];
            while(choices.length < 4 && pool.length > 4) {
                let r = pool[Math.floor(Math.random() * pool.length)];
                if (!choices.includes(r)) choices.push(r);
            }
            choices.sort(() => Math.random() - 0.5);

            choices.forEach(c => {
                const b = document.createElement('button'); b.className = 'ans-btn'; b.innerText = c;
                b.onclick = () => {
                    if (c === correct) { score++; index++; render(); }
                    else {
                        hp--; document.getElementById('card').classList.add('shake');
                        setTimeout(() => document.getElementById('card').classList.remove('shake'), 400);
                        alert("Sai rồi! Đáp án: " + correct);
                        currentQueue.push(currentQueue.splice(index, 1)[0]); render();
                    }
                };
                ansGrid.appendChild(b);
            });
        }
        renderPersonalList();
    </script>
</body>
</html>
