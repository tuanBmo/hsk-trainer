<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK Trainer - GenZ Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #ec4899;
            --accent: #06b6d4;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; transition: all 0.25s ease; }

        body {
            margin: 0;
            font-family: 'Quicksand', sans-serif;
            background: radial-gradient(circle at top right, #312e81, #0f172a);
            color: #fff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .app-shell {
            width: 1100px;
            height: 850px;
            max-width: 95vw;
            max-height: 95vh;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 45px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 50px 100px rgba(0,0,0,0.5);
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 300px;
            background: rgba(0, 0, 0, 0.2);
            padding: 40px 30px;
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
        }

        .logo-text {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 24px;
            background: linear-gradient(to right, #818cf8, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
            text-align: center;
        }

        .level-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 40px;
        }

        .lvl-pill {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 12px;
            border-radius: 18px;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
        }

        .lvl-pill.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-color: transparent;
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

        /* --- MAIN AREA --- */
        .main-screen {
            flex: 1;
            padding: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
        }

        .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; }
        .screen.active { display: flex; }

        h1.hero-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 60px;
            font-weight: 900;
            margin: 0;
            line-height: 1;
            text-align: center;
        }

        .mode-shelf {
            display: flex;
            gap: 20px;
            margin: 50px 0;
            width: 100%;
        }

        .mode-card {
            flex: 1;
            background: rgba(255,255,255,0.03);
            border: 2px solid var(--glass-border);
            padding: 30px 20px;
            border-radius: 35px;
            text-align: center;
            cursor: pointer;
        }

        .mode-card.active {
            border-color: var(--accent);
            background: rgba(6, 182, 212, 0.1);
            transform: translateY(-10px);
        }

        .mode-card b { font-size: 20px; color: var(--accent); display: block; margin-bottom: 10px; }
        .mode-card span { font-size: 13px; color: #94a3b8; }

        .btn-play {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            color: white;
            border: none;
            padding: 25px 80px;
            border-radius: 100px;
            font-family: 'Montserrat', sans-serif;
            font-size: 24px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 20px 40px rgba(99, 102, 241, 0.4);
        }

        /* --- GAME UI --- */
        .game-nav {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .hp-dots { font-size: 30px; color: #ef4444; filter: drop-shadow(0 0 10px rgba(239, 68, 68, 0.4)); }

        .flash-card {
            background: var(--glass);
            width: 100%;
            max-width: 600px;
            padding: 60px;
            border-radius: 50px;
            border: 1px solid var(--glass-border);
            text-align: center;
            position: relative;
            box-shadow: 0 40px 80px rgba(0,0,0,0.3);
            margin-bottom: 40px;
        }

        .tag {
            position: absolute;
            top: 30px; right: 30px;
            background: var(--accent);
            padding: 6px 15px;
            border-radius: 100px;
            font-weight: 800;
            font-size: 12px;
            color: var(--bg);
        }

        .q-main { font-size: 100px; font-weight: 900; margin: 0; }
        
        /* Flexbox cho khu vực Pinyin để nút con mắt nằm cạnh */
        .q-sub-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
            min-height: 45px;
        }
        .q-sub { font-size: 26px; color: var(--accent); margin: 0; font-weight: 700; }
        
        .btn-peek {
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--glass-border);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .btn-peek:hover { background: var(--accent); color: var(--bg); }

        .ans-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
            max-width: 650px;
        }

        .ans-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 25px;
            border-radius: 30px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
        }

        .ans-btn:hover { background: rgba(255,255,255,0.1); border-color: var(--accent); transform: translateY(-5px); }

        @keyframes error {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }
        .shake { animation: error 0.4s ease-in-out; }

    </style>
</head>
<body>

    <div class="app-shell">
        <aside class="sidebar">
            <div class="logo-text">HSK GEN-Z ⚡</div>
            <div class="side-title" style="color: #94a3b8; font-size: 12px; font-weight: 800; margin-bottom: 15px; text-transform: uppercase;">Chọn Level</div>
            <div class="level-grid" id="levelGrid"></div>
            
            <div style="margin-top: auto; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 30px;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px;">
                    <span>Trộn câu</span>
                    <input type="checkbox" id="isRandom" checked>
                </div>
                <div style="display: flex; justify-content: space-between; font-size: 14px;">
                    <span>Hiện Pinyin</span>
                    <input type="checkbox" id="showPinyin" checked>
                </div>
            </div>
        </aside>

        <main class="main-screen">
            <div id="homeScreen" class="screen active">
                <h1 class="hero-title">BẮT ĐẦU<br><span style="color: var(--accent);">HÀNH TRÌNH</span></h1>
                <p style="color: #94a3b8; font-size: 18px;">Học tiếng Trung kiểu chill chill cùng tuanbmo ✌️</p>

                <div class="mode-shelf">
                    <div class="mode-card active" data-mode="NGHĨA"><b>NGHĨA</b><span>Đoán bừa hay đoán mò?</span></div>
                    <div class="mode-card" data-mode="PINYIN"><b>PINYIN</b><span>Đọc sai là tự vả!</span></div>
                    <div class="mode-card" data-mode="CHỮ HÁN"><b>CHỮ HÁN</b><span>Chế độ 'Căng não'!</span></div>
                </div>

                <button class="btn-play" id="btnPlay">VÀO VIỆC!</button>
                <p style="margin-top: 40px; color: #475569; font-size: 13px; font-weight: 700;">Author: tuanbmo | GenZ Mastery Edition</p>
            </div>

            <div id="gameScreen" class="screen">
                <nav class="game-nav">
                    <div class="hp-dots" id="hpBox">❤️❤️❤️❤️❤️</div>
                    <div id="progressInfo" style="font-weight: 800; color: #94a3b8;">0/0</div>
                    <button onclick="location.reload()" style="background: #ef4444; border: none; color: white; padding: 10px 20px; border-radius: 15px; font-weight: 800; cursor: pointer;">DỪNG</button>
                </nav>

                <div class="flash-card" id="card">
                    <div class="tag" id="lvlTag">HSK1</div>
                    <h2 class="q-main" id="qMain">你好</h2>
                    <div class="q-sub-container">
                        <p class="q-sub" id="qSub">nǐ hǎo</p>
                        <button class="btn-peek" id="btnPeek" title="Xem lén Pinyin">👁</button>
                    </div>
                    <div class="q-ex" id="qEx">Chào bạn nhé!</div>
                </div>

                <div class="ans-grid" id="ansGrid"></div>
            </div>
        </main>
    </div>

    <script>
        const levels = ["HSK1", "HSK2", "HSK3", "HSK4", "HSK5", "HSK6", "HSK7", "HSK8", "HSK9"];
        let selectedLevels = [], selectedMode = "NGHĨA", masterData = [], currentQueue = [], index = 0, hp = 5, score = 0;

        const saltQuotes = ["🤡 Gà!", "🍲 Mất lẩu Haidilao!", "🫠 Não cá vàng à?", "💀 Toang thật sự!"];

        // Init Level Buttons
        const grid = document.getElementById('levelGrid');
        levels.forEach(l => {
            const btn = document.createElement('div');
            btn.className = 'lvl-pill'; btn.innerText = l;
            btn.onclick = () => {
                btn.classList.toggle('active');
                const val = l.toLowerCase();
                if (selectedLevels.includes(val)) selectedLevels = selectedLevels.filter(x => x !== val);
                else selectedLevels.push(val);
            }
            grid.appendChild(btn);
        });

        // Mode Switching
        document.querySelectorAll('.mode-card').forEach(card => {
            card.onclick = () => {
                document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                selectedMode = card.dataset.mode;
            }
        });

        document.getElementById('btnPlay').onclick = async () => {
            if (selectedLevels.length === 0) return alert("Chọn Level đi bạn ơi!");
            document.getElementById('btnPlay').innerText = "ĐANG TẢI DỮ LIỆU...";
            masterData = [];
            for (let l of selectedLevels) {
                try {
                    const res = await fetch(`${l}.csv`);
                    const text = await res.text();
                    const parsed = Papa.parse(text, { skipEmptyLines: true });
                    masterData = [...masterData, ...parsed.data.map(r => ({ h: r[0], p: r[1], m: r[2], t: r[3], e: r[4], lvl: l.toUpperCase() }))];
                } catch(e) {}
            }
            if (masterData.length === 0) return (alert("Không thấy file CSV!"), document.getElementById('btnPlay').innerText = "VÀO VIỆC!");
            currentQueue = [...masterData];
            if (document.getElementById('isRandom').checked) currentQueue.sort(() => Math.random() - 0.5);
            document.getElementById('homeScreen').classList.remove('active');
            document.getElementById('gameScreen').classList.add('active');
            render();
        };

        function render() {
            if (index >= currentQueue.length || hp <= 0) {
                alert(hp <= 0 ? "BẠN ĐÃ BAY MÀU! 💀" : "XUẤT SẮC! 🎉");
                location.reload(); return;
            }

            const data = currentQueue[index];
            const isP = document.getElementById('showPinyin').checked;
            const btnPeek = document.getElementById('btnPeek');
            const qSub = document.getElementById('qSub');

            document.getElementById('lvlTag').innerText = data.lvl;
            document.getElementById('progressInfo').innerText = `DIỆT: ${score}/${currentQueue.length}`;
            document.getElementById('hpBox').innerText = "❤️".repeat(Math.max(0, hp));

            // Reset Peek button
            btnPeek.style.display = "none";
            
            let correct = "";
            if (selectedMode === "NGHĨA") {
                document.getElementById('qMain').innerText = data.h;
                document.getElementById('qMain').style.fontSize = "100px";
                correct = data.m;
                if (isP) { qSub.innerText = data.p; }
                else { qSub.innerText = "****"; btnPeek.style.display = "flex"; }
            } else if (selectedMode === "PINYIN") {
                document.getElementById('qMain').innerText = data.h;
                document.getElementById('qMain').style.fontSize = "100px";
                qSub.innerText = data.m;
                correct = data.p;
            } else { // CHỮ HÁN Mode
                document.getElementById('qMain').innerText = data.m;
                document.getElementById('qMain').style.fontSize = "45px";
                correct = data.h;
                if (isP) { qSub.innerText = data.p; }
                else { qSub.innerText = "****"; btnPeek.style.display = "flex"; }
            }
            document.getElementById('qEx').innerText = data.e || "";

            // Xử lý nút Peek
            btnPeek.onclick = () => {
                qSub.innerText = data.p;
                btnPeek.style.display = "none";
            };

            const ansGrid = document.getElementById('ansGrid');
            ansGrid.innerHTML = "";
            const key = selectedMode === "NGHĨA" ? 'm' : (selectedMode === "PINYIN" ? 'p' : 'h');
            let choices = [correct];
            const pool = [...new Set(masterData.map(x => x[key]))];
            while(choices.length < 4 && pool.length > 4) {
                let r = pool[Math.floor(Math.random() * pool.length)];
                if (!choices.includes(r)) choices.push(r);
            }
            choices.sort(() => Math.random() - 0.5);

            choices.forEach(c => {
                const b = document.createElement('button');
                b.className = 'ans-btn'; b.innerText = c;
                b.onclick = () => {
                    if (c === correct) { score++; index++; render(); }
                    else {
                        hp--; document.getElementById('card').classList.add('shake');
                        setTimeout(() => document.getElementById('card').classList.remove('shake'), 400);
                        alert(`${saltQuotes[Math.floor(Math.random()*saltQuotes.length)]}\nĐáp án: ${correct}`);
                        const item = currentQueue.splice(index, 1)[0];
                        currentQueue.push(item); render();
                    }
                };
                ansGrid.appendChild(b);
            });
        }
    </script>
</body>
</html>
