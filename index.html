<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK 3.0 Trainer - Mastery Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="sidebar w-[240px] flex flex-col">
        <div class="p-6 overflow-y-auto flex-1">
            <h2 class="text-[#38bdf8] font-bold text-center mb-6 tracking-widest uppercase text-sm">🎯 Chọn Level</h2>
            <div id="level-list" class="space-y-2">
                </div>

            <div class="mt-8">
                <h2 class="text-[#2dd4bf] font-bold text-center mb-4 uppercase text-sm">⚙️ Settings</h2>
                <div class="bg-[#0f172a] p-4 rounded-2xl space-y-5 border border-[#334155]">
                    <div class="flex justify-between items-center text-xs">
                        <span>Hiện Pinyin</span>
                        <label class="switch"><input type="checkbox" id="set-pinyin" checked><span class="slider"></span></label>
                    </div>
                    <div class="flex justify-between items-center text-xs">
                        <span>Hiện Ví dụ</span>
                        <label class="switch"><input type="checkbox" id="set-example" checked><span class="slider"></span></label>
                    </div>
                    <div class="flex justify-between items-center text-xs">
                        <span>Trộn câu</span>
                        <label class="switch"><input type="checkbox" id="set-random" checked><span class="slider"></span></label>
                    </div>
                </div>
            </div>
        </div>
        <div class="p-4 text-center border-t border-[#334155]">
            <p class="text-[#475569] text-xs font-bold">Author: tuanbmo</p>
        </div>
    </aside>

    <main class="flex-1 flex flex-col items-center justify-center p-10 relative bg-[#0f172a]">
        
        <div id="menu-screen" class="w-full max-w-2xl text-center">
            <h1 class="text-7xl font-bold text-[#38bdf8] mb-2">HSK 3.0 Trainer</h1>
            <p class="text-[#94a3b8] italic mb-12">Dăm ba cái chữ Hán, nhắm mắt cũng chọn đại được! 😎</p>
            
            <div class="card-bg p-8 rounded-[30px] border border-[#334155] mb-10">
                <p class="text-xs font-bold text-[#94a3b8] mb-6 uppercase tracking-widest">🎁 Chế độ hành xác nào đây chiến thần?</p>
                <div class="grid grid-cols-3 gap-4">
                    <button onclick="selectMode('NGHĨA')" id="mode-NGHĨA" class="btn-mode py-4 rounded-xl font-bold active-mode">NGHĨA</button>
                    <button onclick="selectMode('PINYIN')" id="mode-PINYIN" class="btn-mode py-4 rounded-xl font-bold">PINYIN</button>
                    <button onclick="selectMode('HANZI')" id="mode-HANZI" class="btn-mode py-4 rounded-xl font-bold">CHỮ HÁN</button>
                </div>
            </div>

            <button onclick="startGame()" class="btn-start w-full py-7 text-white text-2xl font-bold transition-all active:scale-95">
                VÀO VIỆC LUÔN!
            </button>
        </div>

        <div id="game-screen" class="hidden w-full max-w-2xl text-center">
            <div class="flex justify-between items-center mb-8">
                <span id="hp-display" class="text-[#f43f5e] text-4xl">♥♥♥♥♥</span>
                <div class="space-x-2">
                    <button onclick="location.reload()" class="bg-[#fbbf24] text-[#0f172a] px-4 py-2 rounded-lg font-bold text-sm">↻ Lại</button>
                    <button onclick="location.reload()" class="bg-[#f43f5e] text-white px-4 py-2 rounded-lg font-bold text-sm">✖ Bỏ cuộc</button>
                </div>
            </div>
            
            <div class="card-bg p-12 rounded-[40px] border-2 border-[#38bdf8] relative mb-10 shadow-2xl">
                <span id="lvl-tag" class="absolute top-6 right-6 bg-[#38bdf8] text-[#0f172a] px-4 py-1 rounded-lg font-bold text-xs uppercase">HSK1</span>
                <h2 id="main-q" class="text-8xl font-bold mb-4">---</h2>
                <p id="sub-q" class="text-3xl text-[#94a3b8]">---</p>
                <p id="example-q" class="text-lg text-[#2dd4bf] mt-6 italic"></p>
            </div>

            <div id="ans-container" class="grid grid-cols-1 gap-3">
                </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
