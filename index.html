<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK 3.0 Trainer - Mastery Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="flex h-screen overflow-hidden text-white bg-[#0f172a]">

    <aside class="sidebar w-[240px] flex flex-col border-r-4 border-[#334155]">
        <div class="p-6 overflow-y-auto flex-1">
            <h2 class="text-[#38bdf8] font-bold text-center mb-6 tracking-widest uppercase text-sm">🎯 Chọn Level</h2>
            <div id="level-list" class="space-y-2">
                </div>

            <div class="mt-8">
                <h2 class="text-[#2dd4bf] font-bold text-center mb-4 uppercase text-sm">⚙️ Settings</h2>
                <div class="bg-[#1e293b] p-4 rounded-2xl space-y-5 border border-[#334155] shadow-inner">
                    <div class="flex justify-between items-center text-xs">
                        <span>Hiện Pinyin</span>
                        <label class="switch"><input type="checkbox" id="set-pinyin" checked><span class="slider"></span></label>
                    </div>
                    <div class="flex justify-between items-center text-xs">
                        <span>Hiện Ví dụ</span>
                        <label class="switch"><input type="checkbox" id="set-example" checked><span class="slider"></span></label>
                    </div>
                    <div class="flex justify-between items-center text-xs">
                        <span>Trộn câu</span>
                        <label class="switch"><input type="checkbox" id="set-random" checked><span class="slider"></span></label>
                    </div>
                </div>
            </div>
        </div>
        <div class="p-4 text-center border-t border-[#334155] bg-[#1e293b]">
            <p class="text-[#94a3b8] text-xs font-bold">Author: tuanbmo</p>
        </div>
    </aside>

    <main class="flex-1 flex flex-col items-center justify-center p-10 relative">
        
        <div id="menu-screen" class="w-full max-w-2xl text-center">
            <h1 class="text-7xl font-black text-[#38bdf8] mb-2 drop-shadow-[0_5px_15px_rgba(56,189,248,0.4)]">HSK 3.0 Trainer</h1>
            <p class="text-[#94a3b8] italic mb-12">Dăm ba cái chữ Hán, nhắm mắt cũng chọn đại được! 😎</p>
            
            <div class="bg-[#1e293b] p-8 rounded-[30px] border border-[#334155] mb-10 shadow-2xl">
                <p class="text-xs font-bold text-[#94a3b8] mb-6 uppercase tracking-widest">🎁 Chế độ hành xác nào đây chiến thần?</p>
                <div class="grid grid-cols-3 gap-4">
                    <button onclick="selectMode('NGHĨA')" id="mode-NGHĨA" class="btn-mode py-4 rounded-xl font-bold active-mode">NGHĨA</button>
                    <button onclick="selectMode('PINYIN')" id="mode-PINYIN" class="btn-mode py-4 rounded-xl font-bold">PINYIN</button>
                    <button onclick="selectMode('HANZI')" id="mode-HANZI" class="btn-mode py-4 rounded-xl font-bold">CHỮ HÁN</button>
                </div>
            </div>

            <button onclick="startGame()" class="btn-start w-full py-7 text-white text-3xl font-black transition-all active:scale-95 shadow-[0_10px_30px_rgba(14,165,233,0.5)]">
                VÀO VIỆC LUÔN!
            </button>
            <p class="mt-10 text-[#f43f5e] text-sm animate-pulse">⚠️ Học nhiều quá là bị nghiện đó nha!</p>
        </div>

        <div id="game-screen" class="hidden w-full max-w-2xl text-center">
            <div class="flex justify-between items-center mb-8 w-full px-4">
                <span id="hp-display" class="text-[#f43f5e] text-4xl drop-shadow-md">♥♥♥♥♥</span>
                <div class="flex gap-3">
                    <button onclick="location.reload()" class="bg-[#fbbf24] text-[#0f172a] px-5 py-2 rounded-xl font-bold text-sm hover:scale-105 transition">↻ Lại</button>
                    <button onclick="location.reload()" class="bg-[#f43f5e] text-white px-5 py-2 rounded-xl font-bold text-sm hover:scale-105 transition">✖ Bỏ cuộc</button>
                </div>
            </div>
            
            <div class="bg-[#1e293b] p-12 rounded-[40px] border-2 border-[#38bdf8] relative mb-10 shadow-[0_20px_50px_rgba(0,0,0,0.5)]">
                <span id="lvl-tag" class="absolute top-6 right-6 bg-[#38bdf8] text-[#0f172a] px-4 py-1 rounded-lg font-black text-xs uppercase shadow-md">HSK1</span>
                <h2 id="main-q" class="text-8xl font-black mb-4 text-white drop-shadow-[0_2px_10px_rgba(255,255,255,0.3)]">---</h2>
                <p id="sub-q" class="text-3xl text-[#cbd5e1] font-medium italic">---</p>
                <div id="example-q" class="text-xl text-[#2dd4bf] mt-8 p-4 bg-[#0f172a]/50 rounded-xl border border-[#334155] hidden"></div>
            </div>

            <div id="ans-container" class="grid grid-cols-1 gap-4 px-6">
                </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
