<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK 3.0 Trainer - GenZ Peek Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --primary-grad: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --secondary-grad: linear-gradient(135deg, #3b82f6 0%, #2dd4bf 100%);
            --bg-dark: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.7);
            --text-white: #ffffff;
            --text-dim: #94a3b8;
            --accent-pink: #f43f5e;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: var(--text-white);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .app-window {
            width: 1000px;
            height: 800px;
            max-width: 95vw;
            max-height: 95vh;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            display: flex;
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        .screen { display: none; width: 100%; height: 100%; }
        .screen.active { display: flex; }

        /* SIDEBAR */
        .sidebar {
            width: 280px;
            background: rgba(30, 41, 59, 0.4);
            padding: 30px;
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
        }

        .side-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            margin-bottom: 20px;
        }

        .level-pill-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 40px;
        }

        .pill-btn {
            background: rgba(51, 65, 85, 0.5);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 12px;
            border-radius: 16px;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
            text-align: center;
        }

        .pill-btn.active {
            background: var(--primary-grad);
            border-color: transparent;
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.5);
        }

        .setting-card {
            background: rgba(15, 23, 42, 0.4);
            padding: 20px;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .toggle-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        /* HOME CONTENT */
        .home-main {
            flex: 1;
            padding: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .hero-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 64px;
            margin: 0;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .mode-selection { display: flex; gap: 15px; margin: 50px 0; width: 100%; }
        .mode-card {
            flex: 1; background: var(--bg-card); border: 1px solid var(--glass-border);
            padding: 30px 20px; border-radius: 32px; cursor: pointer;
        }
        .mode-card.active { border-color: #a855f7; background: rgba(168, 85, 247, 0.1); }
        .mode-card b { font-size: 20px; color: #a855f7; }

        .btn-big-play {
            background: var(--primary-grad); color: white; border: none;
            padding: 30px 80px; border-radius: 100px; font-family: 'Montserrat', sans-serif;
            font-size: 28px; cursor: pointer; box-shadow: 0 20px 40px -10px rgba(99, 102, 241, 0.5);
        }

        /* GAME SCREEN */
        .game-nav {
            padding: 20px 40px; display: flex; justify-content: space-between;
            align-items: center; background: rgba(30, 41, 59, 0.4);
        }

        .hp-bar { font-size: 28px; color: var(--accent-pink); letter-spacing: 5px; }

        .quiz-container { flex: 1; padding: 40px 100px; display: flex; flex-direction: column; align-items: center; }

        .flash-card {
            background: var(--bg-card); width: 100%; padding: 60px;
            border-radius: 48px; border: 1px solid var(--glass-border);
            text-align: center; position: relative; margin-bottom: 40px;
        }

        .q-text { font-size: 90px; font-weight: 800; margin: 0; }
        
        /* Container cho Pinyin + Nút con mắt */
        .q-sub-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
            min-height: 40px;
        }
        .sub-text { font-size: 24px; color: #38bdf8; font-weight: 600; }
        
        .peek-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .peek-btn:hover { background: #38bdf8; color: #0f172a; }

        .choice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; }
        .choice-btn {
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            color: white; padding: 25px; border-radius: 24px; font-size: 20px; font-weight: 600; cursor: pointer;
        }
        .choice-btn:hover { border-color: #38bdf8; background: rgba(255,255,255,0.1); }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .shake { animation: shake 0.3s ease-in-out; }

    </style>
</head>
<body>

    <div class="app-window">
        <div id="screenHome" class="screen active">
            <aside class="sidebar">
                <div class="side-title">Học Level nào?</div>
                <div class="level-pill-grid" id="lvlGrid"></div>
                <div class="side-title">Cấu hình</div>
                <div class="setting-card">
                    <div class="toggle-row"><span>Hiện Pinyin</span><input type="checkbox" id="cfgPinyin" checked></div>
                    <div class="toggle-row"><span>Hiện Ví dụ</span><input type="checkbox" id="cfgExample" checked></div>
                    <div class="toggle-row"><span>Trộn câu</span><input type="checkbox" id="cfgRandom" checked></div>
                </div>
            </aside>

            <main class="home-main">
                <h1 class="hero-title">HSK 3.0 Trainer</h1>
                <p style="color: var(--text-dim);">Vibe GenZ - Học là phải "dính" ✌️</p>
                <div class="mode-selection">
                    <div class="mode-card active" data-mode="NGHĨA"><b>NGHĨA</b></div>
                    <div class="mode-card" data-mode="PINYIN"><b>PINYIN</b></div>
                    <div class="mode-card" data-mode="CHỮ HÁN"><b>CHỮ HÁN</b></div>
                </div>
                <button class="btn-big-play" id="playBtn">BẮT ĐẦU</button>
                <p style="margin-top: auto; color: var(--text-dim); font-size: 12px;">Author: tuanbmo | GenZ Edition</p>
            </main>
        </div>

        <div id="screenGame" class="screen">
            <div style="display: flex; flex-direction: column; width: 100%;">
                <nav class="game-nav">
                    <div class="hp-bar" id="hpBox">❤️❤️❤️❤️❤️</div>
                    <div id="progInfo" style="font-weight: bold; color: var(--text-dim)">0/0</div>
                    <button class="pill-btn" onclick="location.reload()" style="background: var(--accent-pink)">DỪNG</button>
                </nav>

                <main class="quiz-container">
                    <div class="flash-card" id="mainCard">
                        <div id="lvlTag" style="position: absolute; top: 30px; right: 30px; background: var(--secondary-grad); padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 12px;">HSK1</div>
                        <h1 class="q-text" id="qPrimary">你好</h1>
                        <div class="q-sub-wrap">
                            <span class="sub-text" id="qSecondary">nǐ hǎo</span>
                            <button class="peek-btn" id="btnPeek" title="Xem lén">👁</button>
                        </div>
                        <div id="qExample" style="margin-top: 15px; color: #2dd4bf; font-style: italic;"></div>
                    </div>
                    <div class="choice-grid" id="choiceGrid"></div>
                </main>
            </div>
        </div>
    </div>

    <script>
        const levels = ["HSK1", "HSK2", "HSK3", "HSK4", "HSK5", "HSK6", "HSK7", "HSK8", "HSK9"];
        let selectedLevels = [], selectedMode = "NGHĨA", masterData = [], sessionQueue = [], idx = 0, hp = 5, score = 0;

        // Init Levels
        const lvlGrid = document.getElementById('lvlGrid');
        levels.forEach(l => {
            const btn = document.createElement('button');
            btn.className = 'pill-btn'; btn.innerText = l;
            btn.onclick = () => {
                btn.classList.toggle('active');
                const val = l.toLowerCase();
                if (selectedLevels.includes(val)) selectedLevels = selectedLevels.filter(x => x !== val);
                else selectedLevels.push(val);
            };
            lvlGrid.appendChild(btn);
        });

        // Mode Selection
        document.querySelectorAll('.mode-card').forEach(card => {
            card.onclick = () => {
                document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                selectedMode = card.dataset.mode;
            };
        });

        // Load Data
        async function loadFiles() {
            masterData = [];
            for (let l of selectedLevels) {
                try {
                    const res = await fetch(`${l}.csv`);
                    const text = await res.text();
                    const parsed = Papa.parse(text, { skipEmptyLines: true });
                    masterData = [...masterData, ...parsed.data.map(r => ({ h: r[0], p: r[1], m: r[2], t: r[3], e: r[4], lvl: l.toUpperCase() }))];
                } catch(e) {}
            }
        }

        document.getElementById('playBtn').onclick = async () => {
            if (selectedLevels.length === 0) return alert("Chọn level đã!");
            document.getElementById('playBtn').innerText = "ĐANG TẢI...";
            await loadFiles();
            if (masterData.length === 0) return alert("Không thấy file CSV!");
            sessionQueue = [...masterData];
            if (document.getElementById('cfgRandom').checked) sessionQueue.sort(() => Math.random() - 0.5);
            document.getElementById('screenHome').classList.remove('active');
            document.getElementById('screenGame').classList.add('active');
            render();
        };

        function render() {
            if (idx >= sessionQueue.length || hp <= 0) {
                alert(hp <= 0 ? "BẠN ĐÃ BAY MÀU! 💀" : "BẬC THẦY HÁN NGỮ! 🎉");
                location.reload(); return;
            }

            const data = sessionQueue[idx];
            const isPOn = document.getElementById('cfgPinyin').checked;
            const isEOn = document.getElementById('cfgExample').checked;
            const btnPeek = document.getElementById('btnPeek');
            const qSec = document.getElementById('qSecondary');

            document.getElementById('lvlTag').innerText = data.lvl;
            document.getElementById('progInfo').innerText = `${score}/${sessionQueue.length}`;
            document.getElementById('hpBox').innerText = "❤️".repeat(Math.max(0, hp));

            btnPeek.style.display = "none"; 
            let correct = "";

            if (selectedMode === "NGHĨA") {
                document.getElementById('qPrimary').innerText = data.h;
                correct = data.m;
                if (isPOn) { qSec.innerText = data.p; } 
                else { qSec.innerText = "****"; btnPeek.style.display = "flex"; }
            } else if (selectedMode === "PINYIN") {
                document.getElementById('qPrimary').innerText = data.h;
                qSec.innerText = data.m;
                correct = data.p;
            } else { // CHỮ HÁN
                document.getElementById('qPrimary').innerText = data.m;
                correct = data.h;
                if (isPOn) { qSec.innerText = data.p; } 
                else { qSec.innerText = "****"; btnPeek.style.display = "flex"; }
            }

            document.getElementById('qExample').innerText = isEOn ? (data.e || "") : "";

            btnPeek.onclick = () => { qSec.innerText = data.p; btnPeek.style.display = "none"; };

            const grid = document.getElementById('choiceGrid'); grid.innerHTML = "";
            const key = selectedMode === "NGHĨA" ? 'm' : (selectedMode === "PINYIN" ? 'p' : 'h');
            let choices = [correct];
            const pool = [...new Set(masterData.map(x => x[key]))];
            while(choices.length < 4 && pool.length > 4) {
                let r = pool[Math.floor(Math.random() * pool.length)];
                if (!choices.includes(r)) choices.push(r);
            }
            choices.sort(() => Math.random() - 0.5);

            choices.forEach(c => {
                const b = document.createElement('button');
                b.className = 'choice-btn'; b.innerText = c;
                b.onclick = () => {
                    if (c === correct) { score++; idx++; render(); }
                    else {
                        hp--; document.getElementById('mainCard').classList.add('shake');
                        setTimeout(() => document.getElementById('mainCard').classList.remove('shake'), 300);
                        alert("Sai rồi! Đáp án: " + correct);
                        const item = sessionQueue.splice(idx, 1)[0];
                        sessionQueue.push(item); render();
                    }
                };
                grid.appendChild(b);
            });
        }
    </script>
</body>
</html>
