<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>HSK Trainer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body class="bg-slate-900 text-white flex flex-col items-center justify-center h-screen">
    <h1 id="word" class="text-8xl mb-8 font-bold text-sky-400">---</h1>
    <p id="pinyin" class="text-2xl text-slate-400 mb-4 opacity-0">Pinyin</p>
    <p id="meaning" class="text-3xl text-emerald-400 mb-10 opacity-0">Nghĩa</p>
    
    <div class="space-x-4">
        <button onclick="loadData(1)" class="bg-slate-700 px-4 py-2 rounded">Học HSK 1</button>
        <button onclick="showAnswer()" class="bg-sky-500 px-6 py-3 rounded-full font-bold">XEM ĐÁP ÁN</button>
        <button onclick="nextWord()" class="bg-amber-500 px-6 py-3 rounded-full font-bold">TỪ TIẾP THEO</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
